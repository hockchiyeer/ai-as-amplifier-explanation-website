      <rect x="0" y="80" width="160" height="24" rx="6" fill="#60a5fa" opacity="0.95" />
      <text x="170" y="96" font-size="12" fill="#0f172a">Interpolation</text>

      <rect x="0" y="120" width="90" height="24" rx="6" fill="#a78bfa" opacity="0.95" />
      <text x="100" y="136" font-size="12" fill="#0f172a">Long-term planning</text>
