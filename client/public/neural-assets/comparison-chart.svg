<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
  <rect width="100%" height="100%" fill="none"/>
  <g transform="translate(40,30)">
    <text x="0" y="0" font-size="14" fill="#0f172a" font-family="Inter, Arial">Model vs Human</text>
    <!-- bars -->
    <g transform="translate(0,20)">
      <rect x="0" y="0" width="220" height="24" rx="6" fill="#60a5fa" opacity="0.95" />
      <text x="230" y="16" font-size="12" fill="#0f172a">Pattern recognition</text>

      <rect x="0" y="40" width="120" height="24" rx="6" fill="#a78bfa" opacity="0.95" />
