<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#60a5fa" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- simple neural layers -->
  <g transform="translate(50,60)">
    <g fill="url(#g1)" opacity="0.95">
      <circle cx="0" cy="40" r="18" />
      <circle cx="0" cy="120" r="18" />
      <circle cx="0" cy="200" r="18" />

      <circle cx="200" cy="20" r="18" />
      <circle cx="200" cy="80" r="18" />
      <circle cx="200" cy="140" r="18" />
      <circle cx="200" cy="200" r="18" />

      <circle cx="400" cy="60" r="18" />
      <circle cx="400" cy="140" r="18" />

      <circle cx="600" cy="100" r="22" fill="#ef4444" />
    </g>
    <!-- connections -->
    <g stroke="#94a3b8" stroke-width="2" fill="none">
      <path d="M18,40 L182,20" />
      <path d="M18,40 L182,80" />
      <path d="M18,120 L182,20" />
      <path d="M18,120 L182,80" />
      <path d="M18,200 L182,140" />
      <path d="M218,20 L382,60" />
      <path d="M218,80 L382,140" />
      <path d="M418,60 L582,100" />
      <path d="M418,140 L582,100" />
    </g>
  <text x="0" y="-10" fill="#0f172a" font-size="14" font-family="Inter, Arial">Neural Net: layers &amp; connections</text>
  </g>
</svg>